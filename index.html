<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>Atlas v3.0 - HOME</title>
  <style>
    :root {
      --bg-black: #030000;
      --bg-deep: #080302;
      --panel-dark: rgba(18, 8, 7, 0.84);
      --panel-red: rgba(44, 10, 10, 0.46);
      --border-copper: rgba(218, 125, 72, 0.56);
      --border-copper-soft: rgba(218, 125, 72, 0.28);
      --border-gold: rgba(245, 190, 103, 0.78);
      --border-red: rgba(150, 34, 34, 0.58);
      --gold: #f3c777;
      --gold-soft: #d9a95f;
      --text-main: #f7f1e8;
      --text-soft: #d9caba;
      --text-muted: #9e8f83;
      --success: #55c979;
      --danger: #e25757;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      min-height: 100%;
      overflow-x: hidden;
      background:
        radial-gradient(circle at 50% -10%, rgba(120, 35, 20, 0.24), transparent 34%),
        radial-gradient(circle at 15% 20%, rgba(120, 20, 20, 0.20), transparent 28%),
        radial-gradient(circle at 85% 35%, rgba(200, 75, 35, 0.11), transparent 30%),
        linear-gradient(180deg, #030000 0%, #080302 42%, #050101 100%);
      color: var(--text-main);
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    body {
      min-height: 100dvh;
    }

    a,
    button {
      color: inherit;
      font: inherit;
      -webkit-tap-highlight-color: transparent;
    }

    button {
      border: 0;
    }

    .app-shell {
      position: relative;
      min-height: 100dvh;
      width: min(100%, 430px);
      margin: 0 auto;
      padding: calc(env(safe-area-inset-top) + 18px) 14px calc(env(safe-area-inset-bottom) + 128px);
      overflow: hidden;
      background:
        radial-gradient(circle at 50% 100%, rgba(170, 22, 22, 0.22), transparent 34%),
        linear-gradient(180deg, rgba(255, 180, 95, 0.035), transparent 16%),
        linear-gradient(180deg, rgba(3, 0, 0, 0.60), rgba(10, 3, 2, 0.88));
      border-left: 1px solid rgba(255, 198, 120, 0.12);
      border-right: 1px solid rgba(255, 198, 120, 0.12);
      box-shadow: inset 0 0 40px rgba(255, 80, 40, 0.07);
    }

    .ambient {
      position: absolute;
      inset: 0;
      z-index: 0;
      pointer-events: none;
      background:
        radial-gradient(circle at 50% 7%, rgba(255, 140, 55, 0.12), transparent 22%),
        radial-gradient(circle at 50% 96%, rgba(255, 58, 42, 0.17), transparent 30%),
        radial-gradient(circle at 10% 54%, rgba(160, 24, 24, 0.16), transparent 32%);
    }

    .ambient::after {
      content: "";
      position: absolute;
      inset: 0;
      opacity: 0.052;
      background-image:
        linear-gradient(rgba(245, 190, 103, 0.55) 1px, transparent 1px),
        linear-gradient(90deg, rgba(245, 190, 103, 0.55) 1px, transparent 1px);
      background-size: 32px 32px;
      mask-image: linear-gradient(180deg, transparent 0%, black 18%, black 82%, transparent 100%);
    }

    .top-shell,
    .content-grid,
    .bottom-dock {
      position: relative;
      z-index: 1;
    }

    .status-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      min-height: 22px;
      padding: 0 40px 10px;
      color: var(--text-main);
      font-size: 13px;
      font-weight: 750;
    }

    .status-icons {
      display: flex;
      align-items: center;
      gap: 6px;
    }

    svg {
      display: block;
      fill: none;
      stroke: currentColor;
      stroke-width: 1.85;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    .status-icons svg {
      width: 18px;
      height: 18px;
    }

    .brand-row {
      display: grid;
      grid-template-columns: minmax(130px, 1fr) 190px;
      align-items: start;
      gap: 12px;
    }

    .brand {
      min-width: 0;
    }

    .brand h1 {
      margin: 0;
      color: var(--text-main);
      font-family: Georgia, "Times New Roman", serif;
      font-size: clamp(30px, 8vw, 39px);
      font-weight: 500;
      line-height: 0.9;
      letter-spacing: 0;
      text-shadow: 0 0 18px rgba(245, 178, 88, 0.12);
    }

    .brand p {
      margin: 7px 0 0;
      color: var(--gold);
      font-size: 9px;
      font-weight: 850;
      letter-spacing: 0.17em;
      line-height: 1.2;
      text-transform: uppercase;
      white-space: nowrap;
    }

    .top-actions {
      display: flex;
      flex-wrap: wrap;
      justify-content: flex-end;
      gap: 7px;
      width: 190px;
    }

    .top-action {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 7px;
      height: 46px;
      padding: 0 10px;
      border: 1px solid var(--border-copper-soft);
      border-radius: 14px;
      background: linear-gradient(180deg, rgba(35, 13, 10, 0.80), rgba(9, 3, 2, 0.90));
      color: var(--text-soft);
      box-shadow:
        inset 0 0 0 1px rgba(255,255,255,0.03),
        0 0 18px rgba(255, 80, 40, 0.06);
      font-size: 12px;
      font-weight: 650;
    }

    .top-action svg {
      width: 19px;
      height: 19px;
    }

    .top-action.active {
      border-color: var(--border-gold);
      color: var(--text-main);
      box-shadow:
        0 0 20px rgba(245, 178, 88, 0.30),
        inset 0 0 16px rgba(245, 178, 88, 0.10);
    }

    .top-action.icon-only {
      width: 44px;
      padding: 0;
    }

    .system-ribbon {
      display: flex;
      align-items: center;
      gap: 13px;
      min-height: 62px;
      margin-top: 16px;
      padding: 0 15px;
      overflow-x: auto;
      scrollbar-width: none;
      border: 1px solid var(--border-gold);
      border-radius: 17px;
      background:
        linear-gradient(180deg, rgba(28, 10, 7, 0.70), rgba(8, 2, 2, 0.84)),
        rgba(17, 7, 5, 0.80);
      box-shadow:
        0 0 22px rgba(245, 150, 70, 0.18),
        inset 0 0 18px rgba(255, 90, 40, 0.06);
    }

    .system-ribbon::-webkit-scrollbar {
      display: none;
    }

    .system-ribbon button,
    .connection-status {
      flex: 0 0 auto;
      display: inline-flex;
      align-items: center;
      gap: 8px;
      border: 0;
      background: transparent;
      color: var(--text-main);
      font-size: 11px;
      font-weight: 820;
      letter-spacing: 0.055em;
      text-transform: uppercase;
      white-space: nowrap;
    }

    .system-ribbon svg {
      width: 20px;
      height: 20px;
    }

    .divider-dot {
      flex: 0 0 auto;
      width: 18px;
      height: 1px;
      background: linear-gradient(90deg, transparent, rgba(245, 190, 103, 0.75), transparent);
    }

    .divider-dot::before,
    .divider-dot::after {
      content: "";
      display: block;
      width: 4px;
      height: 4px;
      margin-top: -2px;
      border-radius: 50%;
      background: rgba(245, 190, 103, 0.75);
      box-shadow: 14px 0 0 rgba(245, 190, 103, 0.55);
    }

    .ribbon-separator {
      flex: 0 0 auto;
      width: 1px;
      height: 24px;
      background: rgba(245, 190, 103, 0.18);
    }

    .connection-status {
      color: var(--text-soft);
      font-size: 11px;
      font-weight: 680;
      letter-spacing: 0;
      text-transform: none;
    }

    .connection-status::before {
      content: "";
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: var(--success);
      box-shadow: 0 0 14px rgba(85, 201, 121, 0.65);
    }

    .content-grid {
      display: grid;
      grid-template-columns: 1.06fr 0.94fr;
      gap: 12px;
      margin-top: 14px;
    }

    .card {
      position: relative;
      min-height: 140px;
      padding: 15px;
      overflow: hidden;
      border: 1px solid rgba(160, 40, 35, 0.58);
      border-radius: 18px;
      background:
        linear-gradient(180deg, rgba(31, 9, 8, 0.74), rgba(8, 3, 2, 0.88)),
        var(--panel-dark);
      box-shadow:
        0 0 24px rgba(180, 28, 28, 0.18),
        inset 0 0 18px rgba(255, 70, 40, 0.05);
      backdrop-filter: blur(10px);
    }

    .card::before {
      content: "";
      position: absolute;
      inset: 0;
      pointer-events: none;
      background: radial-gradient(circle at 20% 0%, rgba(255, 95, 55, 0.12), transparent 35%);
    }

    .card::after {
      content: "";
      position: absolute;
      inset: 0;
      pointer-events: none;
      opacity: 0.13;
      background:
        linear-gradient(rgba(245, 190, 103, 0.18) 1px, transparent 1px),
        linear-gradient(90deg, rgba(245, 190, 103, 0.12) 1px, transparent 1px);
      background-size: 24px 24px;
      mask-image: radial-gradient(circle at 78% 36%, black, transparent 44%);
    }

    .card-content {
      position: relative;
      z-index: 1;
      display: flex;
      min-height: 100%;
      flex-direction: column;
    }

    .large-card {
      grid-row: span 2;
      min-height: 304px;
      border-color: rgba(170, 38, 38, 0.64);
      box-shadow:
        0 0 30px rgba(220, 40, 35, 0.20),
        inset 0 0 22px rgba(255, 70, 40, 0.06);
    }

    .medium-card {
      min-height: 190px;
    }

    .wide-card {
      grid-column: 1 / -1;
      min-height: 172px;
    }

    .card-label {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      color: var(--gold);
      font-size: 10px;
      font-weight: 850;
      letter-spacing: 0.14em;
      line-height: 1.2;
      text-transform: uppercase;
    }

    .card-label svg,
    .chip svg,
    .fake-link svg,
    .row-icon {
      width: 18px;
      height: 18px;
    }

    h2,
    h3,
    p {
      margin: 0;
    }

    .card-title {
      margin-top: 14px;
      color: var(--text-main);
      font-size: 22px;
      font-weight: 680;
      line-height: 1.12;
      letter-spacing: 0;
    }

    .small-title {
      font-size: 16px;
      margin-top: 12px;
    }

    .card-copy {
      margin-top: 11px;
      color: var(--text-soft);
      font-size: 13px;
      line-height: 1.52;
    }

    .ghost-box {
      position: relative;
      min-height: 132px;
      margin-top: 19px;
      border: 1px solid rgba(245, 190, 103, 0.22);
      border-radius: 13px;
      background: rgba(3, 1, 1, 0.36);
      box-shadow: inset 0 0 16px rgba(255, 80, 40, 0.04);
    }

    .ghost-box span {
      display: block;
      padding: 17px;
      color: var(--text-muted);
      font-size: 12px;
      line-height: 1.45;
    }

    .mic-orb {
      position: absolute;
      right: 12px;
      bottom: 12px;
      display: grid;
      place-items: center;
      width: 40px;
      height: 40px;
      border: 1px solid rgba(245, 190, 103, 0.23);
      border-radius: 999px;
      color: var(--gold);
      background: rgba(8, 2, 2, 0.78);
      box-shadow: 0 0 16px rgba(245, 118, 68, 0.15);
    }

    .mic-orb svg {
      width: 20px;
      height: 20px;
    }

    .chip-row {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 7px;
      margin-top: 11px;
    }

    .chip {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 5px;
      min-height: 39px;
      padding: 0 6px;
      border: 1px solid rgba(218, 125, 72, 0.26);
      border-radius: 10px;
      color: var(--text-soft);
      background: rgba(9, 3, 2, 0.56);
      font-size: 10px;
      white-space: nowrap;
    }

    .fake-link {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      min-height: 40px;
      margin-top: auto;
      padding: 0 11px;
      border: 1px solid rgba(218, 125, 72, 0.24);
      border-radius: 10px;
      color: var(--gold);
      background: rgba(9, 3, 2, 0.56);
      font-size: 12px;
      font-weight: 680;
    }

    .figure-glow,
    .heart-orb {
      position: absolute;
      right: 12px;
      top: 35px;
      opacity: 0.86;
      pointer-events: none;
    }

    .figure-glow {
      width: 76px;
      height: 120px;
      background:
        radial-gradient(ellipse at 50% 28%, rgba(255, 70, 58, 0.24), transparent 28%),
        radial-gradient(ellipse at 50% 68%, rgba(255, 70, 58, 0.22), transparent 34%);
      filter: blur(1px);
    }

    .figure-glow::before {
      content: "";
      position: absolute;
      inset: 0 18px;
      border: 1px solid rgba(245, 190, 103, 0.10);
      border-radius: 44% 44% 36% 36%;
      box-shadow: 0 0 28px rgba(255, 48, 40, 0.24);
    }

    .wave-line {
      position: absolute;
      right: 10px;
      top: 96px;
      z-index: 1;
      width: 98px;
      height: 34px;
      color: rgba(255, 70, 58, 0.92);
      filter: drop-shadow(0 0 8px rgba(255, 48, 40, 0.50));
    }

    .heart-orb {
      top: 47px;
      width: 108px;
      height: 108px;
      border-radius: 50%;
      background:
        radial-gradient(circle at 44% 42%, rgba(255, 143, 86, 0.78), transparent 8%),
        radial-gradient(circle at 58% 52%, rgba(190, 22, 24, 0.85), transparent 30%),
        radial-gradient(circle at 46% 48%, rgba(245, 67, 49, 0.50), transparent 52%);
      box-shadow:
        0 0 28px rgba(255, 48, 40, 0.34),
        inset 0 0 24px rgba(245, 190, 103, 0.12);
    }

    .heart-orb::before,
    .heart-orb::after {
      content: "";
      position: absolute;
      border: 1px solid rgba(245, 190, 103, 0.23);
      border-radius: 48% 52% 45% 55%;
      transform: rotate(-18deg);
    }

    .heart-orb::before {
      inset: 18px 27px 18px 25px;
    }

    .heart-orb::after {
      inset: 30px 38px 24px 36px;
      transform: rotate(21deg);
    }

    .list {
      display: grid;
      gap: 10px;
      margin-top: 14px;
    }

    .text-row,
    .action-row,
    .draft-row {
      display: grid;
      align-items: center;
      color: var(--text-soft);
      font-size: 13px;
    }

    .text-row {
      grid-template-columns: 18px 1fr auto;
      gap: 9px;
    }

    .text-row::after {
      content: attr(data-state);
      color: var(--gold-soft);
      font-size: 12px;
    }

    .text-row.low::after {
      color: #86ca8f;
    }

    .action-row {
      grid-template-columns: 21px 1fr 16px;
      gap: 9px;
    }

    .draft-row {
      grid-template-columns: 24px 1fr auto 16px;
      gap: 9px;
      min-height: 40px;
      padding: 0 10px;
      border: 1px solid rgba(218, 125, 72, 0.14);
      border-radius: 10px;
      background: rgba(7, 3, 2, 0.46);
    }

    .draft-main {
      min-width: 0;
    }

    .draft-main strong,
    .draft-main span {
      display: block;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .draft-main strong {
      color: var(--text-main);
      font-size: 13px;
      font-weight: 650;
    }

    .draft-main span {
      margin-top: 1px;
      color: var(--text-muted);
      font-size: 10px;
    }

    .pill {
      padding: 5px 10px;
      border: 1px solid rgba(218, 125, 72, 0.16);
      border-radius: 999px;
      color: var(--text-soft);
      background: rgba(70, 14, 14, 0.26);
      font-size: 10px;
    }

    .pill.final {
      color: #b8d7a7;
      background: rgba(85, 201, 121, 0.10);
    }

    .bottom-dock {
      position: fixed;
      left: max(12px, calc((100vw - 430px) / 2 + 12px));
      right: max(12px, calc((100vw - 430px) / 2 + 12px));
      bottom: calc(env(safe-area-inset-bottom) + 10px);
      display: grid;
      grid-template-columns: repeat(5, minmax(0, 1fr));
      align-items: end;
      min-height: 76px;
      padding: 8px 7px;
      border: 1px solid rgba(160, 38, 35, 0.62);
      border-radius: 26px;
      background:
        radial-gradient(circle at 50% 0%, rgba(245, 178, 88, 0.12), transparent 34%),
        linear-gradient(180deg, rgba(42, 8, 9, 0.90), rgba(11, 3, 3, 0.96));
      box-shadow:
        0 0 32px rgba(210, 32, 32, 0.20),
        inset 0 0 18px rgba(255, 80, 50, 0.06);
      backdrop-filter: blur(18px);
      z-index: 20;
    }

    .dock-item {
      display: grid;
      place-items: center;
      align-content: center;
      gap: 5px;
      min-width: 0;
      min-height: 56px;
      border-radius: 17px;
      color: var(--text-soft);
      font-size: 10px;
      font-weight: 650;
      text-decoration: none;
    }

    .dock-item svg {
      width: 23px;
      height: 23px;
    }

    .dock-center {
      position: relative;
      width: 78px;
      min-height: 88px;
      justify-self: center;
      margin-top: -28px;
      border: 1px solid rgba(245, 170, 90, 0.72);
      border-radius: 999px;
      background:
        radial-gradient(circle at 50% 24%, rgba(245, 190, 103, 0.28), transparent 30%),
        linear-gradient(180deg, rgba(96, 18, 14, 0.96), rgba(27, 5, 4, 0.98));
      color: var(--gold);
      box-shadow:
        0 0 30px rgba(245, 118, 68, 0.36),
        inset 0 0 22px rgba(245, 178, 88, 0.12);
    }

    .dock-center svg {
      width: 31px;
      height: 31px;
    }

    .dock-center span {
      font-size: 9px;
      font-weight: 780;
    }

    /* Compact review mode: visually zooms the reference shell out on iPhone. */
    .app-shell {
      padding: calc(env(safe-area-inset-top) + 10px) 10px calc(env(safe-area-inset-bottom) + 104px);
    }

    .status-row {
      min-height: 18px;
      padding: 0 34px 5px;
      font-size: 12px;
    }

    .status-icons svg {
      width: 16px;
      height: 16px;
    }

    .brand-row {
      grid-template-columns: minmax(118px, 1fr) 184px;
      gap: 9px;
    }

    .brand h1 {
      font-size: clamp(28px, 7.4vw, 35px);
    }

    .brand p {
      margin-top: 5px;
      font-size: 8px;
      letter-spacing: 0.15em;
    }

    .top-actions {
      width: 184px;
      gap: 6px;
    }

    .top-action {
      height: 40px;
      padding: 0 9px;
      border-radius: 13px;
      font-size: 11px;
    }

    .top-action svg {
      width: 17px;
      height: 17px;
    }

    .top-action.icon-only {
      width: 40px;
    }

    .system-ribbon {
      min-height: 54px;
      margin-top: 12px;
      padding: 0 12px;
      gap: 11px;
      border-radius: 15px;
    }

    .system-ribbon button,
    .connection-status {
      gap: 7px;
      font-size: 10px;
    }

    .system-ribbon svg {
      width: 18px;
      height: 18px;
    }

    .ribbon-separator {
      height: 20px;
    }

    .content-grid {
      gap: 9px;
      margin-top: 11px;
      grid-template-columns: 1.04fr 0.96fr;
    }

    .card {
      min-height: 124px;
      padding: 12px;
      border-radius: 16px;
    }

    .large-card {
      min-height: 260px;
    }

    .medium-card {
      min-height: 160px;
    }

    .wide-card {
      min-height: 150px;
    }

    .card-label {
      gap: 6px;
      font-size: 9px;
      letter-spacing: 0.13em;
    }

    .card-label svg,
    .chip svg,
    .fake-link svg,
    .row-icon {
      width: 16px;
      height: 16px;
    }

    .card-title {
      margin-top: 10px;
      font-size: 19px;
    }

    .small-title {
      margin-top: 9px;
      font-size: 14px;
    }

    .card-copy {
      margin-top: 8px;
      font-size: 11px;
      line-height: 1.43;
    }

    .ghost-box {
      min-height: 110px;
      margin-top: 14px;
      border-radius: 11px;
    }

    .ghost-box span {
      padding: 13px;
      font-size: 10px;
    }

    .mic-orb {
      right: 10px;
      bottom: 10px;
      width: 34px;
      height: 34px;
    }

    .mic-orb svg {
      width: 17px;
      height: 17px;
    }

    .chip-row {
      gap: 6px;
      margin-top: 9px;
    }

    .chip {
      min-height: 34px;
      padding: 0 5px;
      font-size: 9px;
    }

    .fake-link {
      min-height: 34px;
      padding: 0 9px;
      font-size: 10px;
    }

    .figure-glow {
      width: 66px;
      height: 104px;
      right: 8px;
      top: 28px;
    }

    .wave-line {
      top: 82px;
      right: 7px;
      width: 82px;
    }

    .heart-orb {
      width: 86px;
      height: 86px;
      right: 8px;
      top: 42px;
    }

    .list {
      gap: 7px;
      margin-top: 10px;
    }

    .text-row,
    .action-row,
    .draft-row {
      font-size: 11px;
    }

    .draft-row {
      min-height: 34px;
      padding: 0 8px;
    }

    .draft-main strong {
      font-size: 11px;
    }

    .draft-main span,
    .pill {
      font-size: 9px;
    }

    .pill {
      padding: 4px 8px;
    }

    .bottom-dock {
      left: max(9px, calc((100vw - 430px) / 2 + 9px));

  <script>
    (function () {
      const accountKey = "admin";
      const activeKey = "atlasinn.v3.aiAssistant." + accountKey + ".active";
      const sessionKey = "atlasinn.v3.aiAssistant." + accountKey + ".session";
      const panelOpenKey = "atlasinn.v3.aiAssistant." + accountKey + ".panelOpen";
      const toggle = document.querySelector("[data-ai-toggle]");
      const draftInput = document.querySelector("[data-ai-draft-input]");
      const contextLabel = document.querySelector("[data-ai-context-label]");
      const contextButtons = Array.from(document.querySelectorAll("[data-ai-context-action]"));
      const floatButton = document.querySelector("[data-ai-float-toggle]");
      const assistantCard = document.querySelector(".ai-assistant-card");
      const resizeHandle = document.querySelector("[data-ai-resize-handle]");
      let resizeState = null;
      let floatSwipeState = null;
      let didSwipeFloat = false;

      if (!toggle) return;

      ensureSession();
      restoreSessionFields();
      setPanelOpen(localStorage.getItem(panelOpenKey) === "true", false);
      setAssistantMode(localStorage.getItem(activeKey) === "true", false);

      toggle.addEventListener("click", function (event) {
        event.preventDefault();
        setAssistantMode(!document.body.classList.contains("ai-assistant-active"), true);
      });

      if (draftInput) {
        draftInput.addEventListener("input", function () {
          writeSessionPatch({
            draftText: draftInput.value,
            updatedAt: new Date().toISOString()
          });
        });
      }

      if (resizeHandle && assistantCard) {
        resizeHandle.addEventListener("pointerdown", beginAssistantResize);
      }

      if (floatButton) {
        floatButton.addEventListener("click", function () {
          if (didSwipeFloat) {
            didSwipeFloat = false;
            return;
          }
          setPanelOpen(!document.body.classList.contains("ai-panel-open"), true);
        });
        floatButton.addEventListener("pointerdown", beginFloatSwipe);
      }

      contextButtons.forEach(function (button) {
        button.addEventListener("click", function () {
          const nextContext = button.dataset.aiContextAction || "No assistant context selected";
          if (contextLabel) contextLabel.textContent = nextContext;
          setActiveContextButton(nextContext);
          writeSessionPatch({
            contextLabel: nextContext,
            updatedAt: new Date().toISOString()
          });
        });
      });

      function setAssistantMode(isActive, shouldSave) {
        document.body.classList.toggle("ai-assistant-active", isActive);
        toggle.setAttribute("aria-pressed", String(isActive));
        toggle.setAttribute("aria-label", isActive ? "Close Eldariel assistant mode" : "Open Eldariel assistant mode");
        const label = toggle.querySelector("span");
        if (label) label.textContent = isActive ? "OFF" : "Eldariel";

        if (shouldSave) {
          localStorage.setItem(activeKey, String(isActive));
          writeSessionPatch({
            mode: isActive ? "active" : "inactive",
            updatedAt: new Date().toISOString()
          });
        }

      }

      function setPanelOpen(isOpen, shouldSave) {
        document.body.classList.toggle("ai-panel-open", isOpen);
        if (floatButton) floatButton.setAttribute("aria-expanded", String(isOpen));
        if (shouldSave) localStorage.setItem(panelOpenKey, String(isOpen));
      }

      function ensureSession() {
        if (localStorage.getItem(sessionKey)) return;
        localStorage.setItem(sessionKey, JSON.stringify({
          accountKey: accountKey,
          mode: "inactive",
          draftText: "",
          contextLabel: "No assistant context selected",
          createdAt: new Date().toISOString(),
          updatedAt: new Date().toISOString()
        }));
      }

      function restoreSessionFields() {
        let current = {};
        try {
          current = JSON.parse(localStorage.getItem(sessionKey) || "{}");
        } catch (error) {
          current = {};
        }
        if (draftInput) draftInput.value = current.draftText || "";
        if (contextLabel) contextLabel.textContent = current.contextLabel || "No assistant context selected";
        applyAssistantSize(current.layout || {});
        setActiveContextButton(current.contextLabel || "");
      }

      function setActiveContextButton(contextValue) {
        contextButtons.forEach(function (button) {
          button.classList.toggle("active", button.dataset.aiContextAction === contextValue);
        });
      }

      function writeSessionPatch(patch) {
        let current = {};
        try {
          current = JSON.parse(localStorage.getItem(sessionKey) || "{}");
        } catch (error) {
          current = {};
        }
        localStorage.setItem(sessionKey, JSON.stringify(Object.assign({}, current, patch)));
      }

      function beginFloatSwipe(event) {
        if (!floatButton) return;
        didSwipeFloat = false;
        floatSwipeState = {
          startX: event.clientX,
          startY: event.clientY
        };
        floatButton.setPointerCapture(event.pointerId);
        floatButton.addEventListener("pointermove", moveFloatSwipe);
        floatButton.addEventListener("pointerup", endFloatSwipe, { once: true });
      }

      function moveFloatSwipe(event) {
        if (!floatSwipeState) return;
        const dx = event.clientX - floatSwipeState.startX;
        const dy = event.clientY - floatSwipeState.startY;
        if (dx > 28 && Math.abs(dy) < 60) {
          didSwipeFloat = true;
          setPanelOpen(true, true);
        }
      }

      function endFloatSwipe() {
        if (!floatButton) return;
        floatButton.removeEventListener("pointermove", moveFloatSwipe);
        floatSwipeState = null;
      }

      function beginAssistantResize(event) {
        event.preventDefault();
        const rect = assistantCard.getBoundingClientRect();
        resizeState = {
          startX: event.clientX,
          startY: event.clientY,
          width: rect.width,
          height: rect.height
        };
        resizeHandle.setPointerCapture(event.pointerId);
        resizeHandle.addEventListener("pointermove", moveAssistantResize);
        resizeHandle.addEventListener("pointerup", endAssistantResize, { once: true });
      }

      function moveAssistantResize(event) {
        if (!resizeState) return;
        const nextWidth = clamp(resizeState.width + event.clientX - resizeState.startX, 250, Math.min(window.innerWidth - 24, 422));
        const nextHeight = clamp(resizeState.height + event.clientY - resizeState.startY, 175, Math.min(window.innerHeight * 0.72, 560));
        applyAssistantSize({ width: Math.round(nextWidth), height: Math.round(nextHeight) });
      }

      function endAssistantResize(event) {
        resizeHandle.removeEventListener("pointermove", moveAssistantResize);
        resizeState = null;
        const rect = assistantCard.getBoundingClientRect();
        writeSessionPatch({
          layout: {
            width: Math.round(rect.width),
            height: Math.round(rect.height)
          },
          updatedAt: new Date().toISOString()
        });
      }

      function applyAssistantSize(layout) {
        if (!assistantCard) return;
        if (layout.width) assistantCard.style.setProperty("--ai-panel-width", Math.round(layout.width) + "px");
        if (layout.height) assistantCard.style.setProperty("--ai-panel-height", Math.round(layout.height) + "px");
      }

      function clamp(value, min, max) {
        return Math.min(Math.max(value, min), Math.max(min, max));
      }
    })();

    (function () {
      const storageKey = "atlasinn.v3.admin.designControls";
      const launcher = document.querySelector("[data-admin-tools-toggle]");
      const panel = document.querySelector(".admin-tools-panel");
      const closeButton = document.querySelector("[data-admin-tools-close]");

      if (!launcher || !panel || !brand || !title || !centerLabel) return;

      const saved = readConfig();

      closeButton.addEventListener("click", function () {

      [logoInput, titleInput, aiInput, showTitleInput].forEach(function (control) {

          setStatus("Saved locally.");

      copyButton.addEventListener("click", async function () {
        const payload = JSON.stringify(currentConfig(), null, 2);

          await navigator.clipboard.writeText(payload);
          setStatus("Design config copied.");
        } catch (error) {
          setStatus("Clipboard blocked. Config is saved locally.");
        }
      });

      resetButton.addEventListener("click", function () {
        localStorage.removeItem(storageKey);
        applyConfig(defaults);
        saveConfig(defaults);
        setStatus("Reset to defaults.");
      });

      function setPanelOpen(isOpen) {
        panel.classList.toggle("open", isOpen);
        launcher.classList.toggle("active", isOpen);
        launcher.setAttribute("aria-expanded", String(isOpen));
      }

      function currentConfig() {
        return {
          logoText: logoInput.value.trim() || defaults.logoText,
          pageTitle: titleInput.value.trim() || defaults.pageTitle,
          aiLabel: aiInput.value.trim() || defaults.aiLabel,
          showTitle: showTitleInput.checked
        };
      }

      function applyConfig(config) {
        const next = Object.assign({}, defaults, config || {});
        logoInput.value = next.logoText;
        titleInput.value = next.pageTitle;
        aiInput.value = next.aiLabel;
        showTitleInput.checked = Boolean(next.showTitle);
        brand.dataset.logoText = next.logoText;
        title.textContent = next.pageTitle;
        centerLabel.textContent = next.aiLabel;
        document.body.classList.toggle("admin-show-page-title", Boolean(next.showTitle));
      }

      function readConfig() {
        try {
          return Object.assign({}, defaults, JSON.parse(localStorage.getItem(storageKey) || "{}"));
        } catch (error) {
          localStorage.removeItem(storageKey);
          return defaults;
        }
      }

      function saveConfig(config) {
        localStorage.setItem(storageKey, JSON.stringify(config));
      }

      function setStatus(message) {
        if (status) status.textContent = message;
      }
    })();

    (function () {
      const storageKey = "atlasinn.v3.admin.markup";
      const panelStorageKey = "atlasinn.v3.admin.markupPanel";
      const layoutStorageKey = "atlasinn.v3.admin.markupLayout";
      const layer = document.querySelector("[data-markup-layer]");
      const launcher = document.querySelector("[data-markup-tool]");
      const panel = document.querySelector(".markup-panel");
      const exportPanel = document.querySelector(".markup-export-panel");
      const imageInput = document.querySelector(".markup-image-input");
      let activeMode = false;
      let selectedShape = null;
      let dragState = null;
      let panelDragState = null;
      let layoutMode = localStorage.getItem(layoutStorageKey) || "current";

      if (!layer || !launcher || !panel || !exportPanel || !imageInput) return;

      restorePanelPosition();
      setLayoutMode(layoutMode, false);
      loadShapes();

      launcher.addEventListener("click", function () {
        setMarkupMode(!activeMode);
      });

      panel.querySelector("[data-markup-close]").addEventListener("click", function () {
        setMarkupMode(false);
      });

      panel.querySelectorAll("[data-markup-add]").forEach(function (button) {
        button.addEventListener("click", function () {
          addShape(button.dataset.markupAdd);
        });
      });

      panel.querySelector("[data-markup-image]").addEventListener("click", function () {
        imageInput.click();
      });

      imageInput.addEventListener("change", function () {
        const file = imageInput.files && imageInput.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.addEventListener("load", function () {
          addImageShape(String(reader.result || ""), file.name || "imported image");
          imageInput.value = "";
        });
        reader.addEventListener("error", function () {
          setStatus("Image import failed.");
          imageInput.value = "";
        });
        reader.readAsDataURL(file);
      });

      panel.querySelectorAll("[data-markup-layout]").forEach(function (button) {
        button.addEventListener("click", function () {
          setLayoutMode(button.dataset.markupLayout || "current", true);
        });
      });

      panel.querySelector("[data-markup-clear]").addEventListener("click", function () {
        layer.innerHTML = "";
        selectedShape = null;
        saveShapes();
        setStatus("Markup cleared.");
      });

      panel.querySelector("[data-markup-copy]").addEventListener("click", async function () {
        const payload = JSON.stringify(markupPayload(), null, 2);
        try {
          await navigator.clipboard.writeText(payload);
          setStatus("Markup JSON copied.");
        } catch (error) {
          openExportPanel(payload);
          setStatus("Clipboard blocked. Export panel opened.");
        }
      });

      panel.querySelector("[data-markup-export]").addEventListener("click", function () {
        openExportPanel(JSON.stringify(markupPayload(), null, 2));
      });

      exportPanel.querySelector("[data-markup-export-close]").addEventListener("click", function () {
        exportPanel.classList.remove("open");
      });

      exportPanel.querySelector("[data-markup-select-export]").addEventListener("click", function () {
        const textarea = exportPanel.querySelector("[data-markup-export-text]");
        textarea.focus();
        textarea.select();
      });

      exportPanel.querySelector("[data-markup-copy-summary]").addEventListener("click", async function () {
        const summary = markupSummary();
        const textarea = exportPanel.querySelector("[data-markup-export-text]");
        textarea.value = summary;
        textarea.focus();
        textarea.select();
        try {
          await navigator.clipboard.writeText(summary);
          setStatus("Short markup copied.");
        } catch (error) {
          setStatus("Short export selected.");
        }
      });

      panel.querySelector(".markup-panel-head").addEventListener("pointerdown", beginPanelDrag);

      document.addEventListener("keydown", function (event) {
        if (!activeMode) return;
        if ((event.key === "Backspace" || event.key === "Delete") && selectedShape) {
          if (document.activeElement && document.activeElement.isContentEditable) return;
          selectedShape.remove();
          selectedShape = null;
          saveShapes();
        }
        if (event.key === "Escape") {
          setMarkupMode(false);
        }
      });

      function setMarkupMode(isActive) {
        activeMode = isActive;
        document.body.classList.toggle("markup-mode", activeMode);
        panel.classList.toggle("open", activeMode);
        launcher.classList.toggle("active", activeMode);
        launcher.setAttribute("aria-expanded", String(activeMode));
        if (!activeMode) clearSelection();
      }

      function setLayoutMode(mode, shouldSave) {
        layoutMode = mode === "blank" ? "blank" : "current";
        document.body.classList.toggle("markup-blank-layout", layoutMode === "blank");
        panel.querySelectorAll("[data-markup-layout]").forEach(function (button) {
          button.classList.toggle("active", button.dataset.markupLayout === layoutMode);
        });
        if (shouldSave) {
          localStorage.setItem(layoutStorageKey, layoutMode);
          setStatus(layoutMode === "blank" ? "New blank shell enabled." : "Current layout restored.");
        }
      }

      function addShape(type) {
        const defaults = {
          box: { x: 58, y: 170, width: 150, height: 82, text: "" },
          circle: { x: 82, y: 210, width: 96, height: 96, text: "" },
          arrow: { x: 72, y: 260, width: 150, height: 28, text: "" },
          text: { x: 56, y: 190, width: 180, height: 46, text: "Edit note" }
        }[type] || { x: 58, y: 170, width: 150, height: 82, text: "" };

        const shape = buildShape({
          id: "mark-" + Date.now(),
          type: type,
          rotate: 0,
          x: defaults.x,
          y: defaults.y,
          width: defaults.width,
          height: defaults.height,
          text: defaults.text
        });
        layer.appendChild(shape);
        selectShape(shape);
        saveShapes();
      }

      function addImageShape(src, name) {
        const shape = buildShape({
          id: "mark-" + Date.now(),
          type: "image",
          x: 36,
          y: 96,
          width: Math.min(250, window.innerWidth - 52),
          height: 180,
          rotate: 0,
          text: name || "imported image",
          src: src
        });
        layer.appendChild(shape);
        selectShape(shape);
        saveShapes();
        setStatus("Image added. Drag it or use the corner handle to resize.");
      }

      function buildShape(data) {
        const shape = document.createElement("div");
        shape.className = "markup-shape markup-" + data.type;
        shape.dataset.markupId = data.id;
        shape.dataset.markupType = data.type;
        shape.dataset.rotate = String(data.rotate || 0);
        shape.style.left = data.x + "px";
        shape.style.top = data.y + "px";
        shape.style.width = data.width + "px";
        shape.style.height = data.height + "px";
        if (data.type === "arrow") {
          shape.style.transform = "rotate(" + (data.rotate || 0) + "deg)";
        }

        if (data.type === "text") {
          const text = document.createElement("div");
          text.className = "markup-text-content";
          text.contentEditable = "true";
          text.textContent = data.text || "Edit note";
          text.addEventListener("input", saveShapes);
          shape.appendChild(text);
        }

        if (data.type === "image") {
          const image = document.createElement("img");
          image.className = "markup-image-content";
          image.src = data.src || "";
          image.alt = data.text || "Imported markup image";
          image.draggable = false;
          shape.dataset.imageSrc = data.src || "";
          shape.dataset.imageName = data.text || "imported image";
          shape.appendChild(image);
        }

        const handle = document.createElement("span");
        handle.className = "markup-resize-handle";
        handle.setAttribute("aria-hidden", "true");
        shape.appendChild(handle);

        if (data.type === "arrow") {
          const rotateHandle = document.createElement("span");
          rotateHandle.className = "markup-rotate-handle";
          rotateHandle.setAttribute("aria-hidden", "true");
          shape.appendChild(rotateHandle);
        }

        shape.addEventListener("pointerdown", beginShapePointer);
        return shape;
      }

      function beginShapePointer(event) {
        if (!activeMode) return;
        const shape = event.currentTarget;
        selectShape(shape);
        const rect = shape.getBoundingClientRect();
        const isResize = event.target.classList.contains("markup-resize-handle");
        const isRotate = event.target.classList.contains("markup-rotate-handle");
        dragState = {
          shape: shape,
          isResize: isResize,
          isRotate: isRotate,
          startX: event.clientX,
          startY: event.clientY,
          left: parsePixels(shape.style.left, rect.left),
          top: parsePixels(shape.style.top, rect.top),
          width: parsePixels(shape.style.width, rect.width),
          height: parsePixels(shape.style.height, rect.height),
          centerX: rect.left + rect.width / 2,
          centerY: rect.top + rect.height / 2
        };
        shape.setPointerCapture(event.pointerId);
        shape.addEventListener("pointermove", moveShapePointer);
        shape.addEventListener("pointerup", endShapePointer, { once: true });
      }

      function moveShapePointer(event) {
        if (!dragState) return;
        const dx = event.clientX - dragState.startX;
        const dy = event.clientY - dragState.startY;
        if (dragState.isRotate) {
          const angle = Math.round(Math.atan2(event.clientY - dragState.centerY, event.clientX - dragState.centerX) * 180 / Math.PI);
          dragState.shape.dataset.rotate = String(angle);
          dragState.shape.style.transform = "rotate(" + angle + "deg)";
        } else if (dragState.isResize) {
          dragState.shape.style.width = Math.max(32, dragState.width + dx) + "px";
          dragState.shape.style.height = Math.max(24, dragState.height + dy) + "px";
        } else {
          dragState.shape.style.left = Math.max(0, dragState.left + dx) + "px";
          dragState.shape.style.top = Math.max(0, dragState.top + dy) + "px";
        }
      }

      function endShapePointer(event) {
        event.currentTarget.removeEventListener("pointermove", moveShapePointer);
        dragState = null;
        saveShapes();
      }

      function beginPanelDrag(event) {
        if (event.target.closest("button")) return;
        event.preventDefault();
        const rect = panel.getBoundingClientRect();
        panelDragState = {
          startX: event.clientX,
          startY: event.clientY,
          left: rect.left,
          top: rect.top,
          width: rect.width,
          height: rect.height
        };
        panel.classList.add("dragging");
        window.addEventListener("pointermove", movePanelDrag);
        window.addEventListener("pointerup", endPanelDrag, { once: true });
      }

      function movePanelDrag(event) {
        if (!panelDragState) return;
        const nextLeft = clamp(panelDragState.left + event.clientX - panelDragState.startX, 6, window.innerWidth - panelDragState.width - 6);
        const nextTop = clamp(panelDragState.top + event.clientY - panelDragState.startY, 6, window.innerHeight - panelDragState.height - 6);
        panel.style.left = Math.round(nextLeft) + "px";
        panel.style.top = Math.round(nextTop) + "px";
        panel.style.right = "auto";
        panel.style.bottom = "auto";
        panel.style.width = Math.round(panelDragState.width) + "px";
      }

      function endPanelDrag() {
        window.removeEventListener("pointermove", movePanelDrag);
        panel.classList.remove("dragging");
        panelDragState = null;
        savePanelPosition();
      }

      function selectShape(shape) {
        clearSelection();
        selectedShape = shape;
        selectedShape.classList.add("selected");
      }

      function clearSelection() {
        layer.querySelectorAll(".markup-shape.selected").forEach(function (shape) {
          shape.classList.remove("selected");
        });
        selectedShape = null;
      }

      function readShapes(includeImageSrc) {
        return Array.from(layer.querySelectorAll(".markup-shape")).map(function (shape) {
          const rect = shape.getBoundingClientRect();
          const data = {
            id: shape.dataset.markupId,
            type: shape.dataset.markupType,
            x: Math.round(parsePixels(shape.style.left, rect.left)),
            y: Math.round(parsePixels(shape.style.top, rect.top)),
            width: Math.round(parsePixels(shape.style.width, rect.width)),
            height: Math.round(parsePixels(shape.style.height, rect.height)),
            rotate: Math.round(Number(shape.dataset.rotate || 0)),
            text: (shape.querySelector(".markup-text-content") && shape.querySelector(".markup-text-content").textContent) || shape.dataset.imageName || ""
          };
          if (shape.dataset.markupType === "image") {
            data.image = shape.dataset.imageName || "imported image";
            if (includeImageSrc) data.src = shape.dataset.imageSrc || "";
          }
          return data;
        });
      }

      function markupPayload() {
        return {
          page: window.location.pathname.split("/").pop() || "admin-functional-test.html",
          url: window.location.href,
          layoutMode: layoutMode,
          viewport: {
            width: window.innerWidth,
            height: window.innerHeight
          },
          shapes: readShapes(false)
        };
      }

      function markupSummary() {
        const payload = markupPayload();
        const parts = payload.shapes.map(function (shape, index) {
          const text = shape.text ? " text=\"" + shape.text.replace(/"/g, "'") + "\"" : "";
          return (index + 1) + "." + shape.type + " x" + shape.x + " y" + shape.y + " w" + shape.width + " h" + shape.height + " r" + shape.rotate + text;
        });
        return [
          "page=" + payload.page,
          "layout=" + payload.layoutMode,
          "viewport=" + payload.viewport.width + "x" + payload.viewport.height,
          "shapes=" + payload.shapes.length
        ].concat(parts).join("\n");
      }

      function openExportPanel(value) {
        const textarea = exportPanel.querySelector("[data-markup-export-text]");
        textarea.value = value;
        exportPanel.classList.add("open");
        window.setTimeout(function () {
          textarea.focus();
          textarea.select();
        }, 0);
      }

      function saveShapes() {
        try {
          localStorage.setItem(storageKey, JSON.stringify(readShapes(true)));
        } catch (error) {
          setStatus("Image is too large to save locally. Try a smaller screenshot.");
        }
      }

      function loadShapes() {
        try {
          const saved = JSON.parse(localStorage.getItem(storageKey) || "[]");
          saved.forEach(function (shape) {
            layer.appendChild(buildShape(shape));
          });
        } catch (error) {
          localStorage.removeItem(storageKey);
        }
      }

      function savePanelPosition() {
        const rect = panel.getBoundingClientRect();
        localStorage.setItem(panelStorageKey, JSON.stringify({
          left: Math.round(rect.left),
          top: Math.round(rect.top),
          width: Math.round(rect.width)
        }));
      }

      function restorePanelPosition() {
        try {
          const saved = JSON.parse(localStorage.getItem(panelStorageKey) || "null");
          if (!saved) return;
          const width = Math.min(saved.width || window.innerWidth - 16, window.innerWidth - 12);
          const left = clamp(saved.left || 8, 6, window.innerWidth - width - 6);
          const top = clamp(saved.top || 80, 6, window.innerHeight - 96);
          panel.style.left = left + "px";
          panel.style.top = top + "px";
          panel.style.right = "auto";
          panel.style.bottom = "auto";
          panel.style.width = width + "px";
        } catch (error) {
          localStorage.removeItem(panelStorageKey);
        }
      }

      function setStatus(message) {
        const status = panel.querySelector("[data-markup-status]");
        if (status) status.textContent = message;
      }

      function parsePixels(value, fallback) {
        const parsed = Number.parseFloat(value);
        return Number.isFinite(parsed) ? parsed : fallback;
      }

      function clamp(value, min, max) {
        return Math.min(Math.max(value, min), Math.max(min, max));
      }
    })();
  </script>

  <script>
    (function () {
      const menuButton = document.querySelector('[data-menu-toggle]');
      const menu = document.querySelector('[data-menu-dropdown]');
      const menuClose = document.querySelector('[data-menu-panel-close]');
      if (!menuButton || !menu) return;
      function placeMenuDropdown() {
        const ribbon = document.querySelector('.system-ribbon');
        const shell = document.querySelector('.app-shell');
        const ribbonRect = ribbon ? ribbon.getBoundingClientRect() : menuButton.getBoundingClientRect();
        const shellRect = shell ? shell.getBoundingClientRect() : { right: window.innerWidth };
        const top = Math.round(ribbonRect.bottom + 7);
        const right = Math.max(14, Math.round(window.innerWidth - shellRect.right + 14));
        menu.style.setProperty('--atlas-menu-top', top + 'px');
        menu.style.setProperty('--atlas-menu-right', right + 'px');
      }

      menuButton.addEventListener('click', function (event) {
        event.stopPropagation();
        const isOpen = !menu.classList.contains('open');
        if (isOpen) placeMenuDropdown();
        menu.classList.toggle('open', isOpen);
        menuButton.setAttribute('aria-expanded', String(isOpen));
      });
      window.addEventListener('resize', function () {
        if (menu.classList.contains('open')) placeMenuDropdown();
      });
      if (menuClose) menuClose.addEventListener('click', function () {
        menu.classList.remove('open');
        menuButton.setAttribute('aria-expanded', 'false');
      });
      document.addEventListener('click', function (event) {
        if (menu.contains(event.target) || menuButton.contains(event.target)) return;
        menu.classList.remove('open');
        menuButton.setAttribute('aria-expanded', 'false');
      });
      const status = document.querySelector('[data-ai-mode-status]');
      const syncStatus = function () {
        if (status) status.textContent = document.body.classList.contains('ai-assistant-active') ? 'ON' : 'OFF';
      };
      syncStatus();
      document.querySelector('[data-ai-toggle]')?.addEventListener('click', function () { window.setTimeout(syncStatus, 0); });
    })();
  </script>

  <script>
    (function () {
      const pageName = document.body.dataset.pageTitle || document.querySelector('.current-page-title')?.textContent?.trim() || '';
      const title = document.querySelector('.current-page-title');
      if (title) title.textContent = pageName;
      document.body.classList.add('admin-show-page-title');

      document.querySelectorAll('.bottom-dock .dock-item').forEach(function (item) {
        const label = item.querySelector('span')?.textContent?.trim().toUpperCase();
        item.classList.toggle('active-page', label === pageName.toUpperCase());
      });

      const status = document.querySelector('[data-ai-mode-status]');
      const toggle = document.querySelector('[data-ai-toggle]');
      const mini = document.querySelector('[data-ai-float-toggle]');
      const syncAssistant = function () {
        const isActive = document.body.classList.contains('ai-assistant-active');
        if (status) status.textContent = isActive ? 'ON' : 'OFF';
        if (toggle) {
          const label = toggle.querySelector('span');
          if (label) label.textContent = isActive ? 'OFF' : 'Eldariel';
        }
      };
      syncAssistant();
      toggle?.addEventListener('click', function () { window.setTimeout(syncAssistant, 0); });
      mini?.addEventListener('click', function (event) {
        window.setTimeout(function () {
          const isOpen = document.body.classList.contains('ai-panel-open');
          mini.setAttribute('aria-expanded', String(isOpen));
          syncAssistant();
        }, 0);
      });
    })();
  </script>

  <script>
    (function () {
      const toggle = document.querySelector('[data-ai-toggle]');
      const status = document.querySelector('[data-ai-mode-status]');
      if (!toggle) return;
      const sync = function () {
        const isActive = document.body.classList.contains('ai-assistant-active');
        document.body.classList.toggle('ai-panel-open', isActive);
        toggle.setAttribute('aria-pressed', String(isActive));
        const label = toggle.querySelector('span');
        if (label) label.textContent = isActive ? 'OFF' : 'Eldariel';
        if (status) status.textContent = isActive ? 'ON' : 'OFF';
        try {
          localStorage.setItem('atlasinn.v3.aiAssistant.admin.panelOpen', String(isActive));
        } catch (error) {}
      };
      sync();
      toggle.addEventListener('click', function () { window.setTimeout(sync, 0); });
    })();

  <script>
    (function () {
      function setRibbonPopoverVars() {
        const ribbon = document.querySelector('.system-ribbon');
        if (!ribbon) return;
        const rect = ribbon.getBoundingClientRect();
        const top = Math.round(rect.bottom - 1);
        const left = Math.max(0, Math.round(rect.left));
        const right = Math.max(0, Math.round(window.innerWidth - rect.right));
        document.documentElement.style.setProperty('--atlas-ribbon-popover-top', top + 'px');
        document.documentElement.style.setProperty('--atlas-ribbon-popover-left', left + 'px');
        document.documentElement.style.setProperty('--atlas-ribbon-popover-right', right + 'px');
      }

      window.AtlasinnPlaceRibbonPopover = setRibbonPopoverVars;
      setRibbonPopoverVars();
      window.addEventListener('resize', setRibbonPopoverVars);
      window.addEventListener('orientationchange', function () {
        window.setTimeout(setRibbonPopoverVars, 120);
      });

      document.querySelectorAll('[data-menu-toggle], [data-markup-tool], [data-admin-tools-toggle]').forEach(function (button) {
        button.addEventListener('click', function () {
          window.setTimeout(setRibbonPopoverVars, 0);
        }, true);
      });
    })();
  </script>
</body>
</html>
